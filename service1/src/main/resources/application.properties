spring.application.name=service1

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/converter_db
spring.datasource.username=converter_user
spring.datasource.password=converter_pass
spring.datasource.driver-class-name=org.postgresql.Driver

hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.hbm2ddl.auto=validate

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

logging.level.root=INFO
logging.level.com.elizaveta.service1=DEBUG
logging.file.name=logs/service1.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} | %-5level | %logger{36} | %msg%n
logging.pattern.console=%d{HH:mm:ss} | %-5level | %logger{36} | %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

service2.base-url=http://localhost:8081